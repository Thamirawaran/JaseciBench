[project]
name = "jasecibench-leaderboard"
version = "0.1.0"
description = "JaseciBench leaderboard — fullstack Jac application. Renders Home / Leaderboard / Methodology / Submit pages backed by JSON files in leaderboard-data/."
entry-point = "main.jac"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
"@fontsource-variable/inter" = "*"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
"@tailwindcss/vite" = "latest"
tailwindcss = "latest"
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.client.app_meta_data]
title = "JaseciBench — Leaderboard for LLMs and coding agents on Jac"
description = "Public benchmark suite evaluating models, coding agents, and app-builder agents on Jac and the Jaseci stack across three layers."
